services:
  pgsql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: otklick
      POSTGRES_USER: otklick
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otklick -d otklick"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      target: app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Отклик"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: "5432"
      DB_DATABASE: otklick
      DB_USERNAME: otklick
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      RUN_MIGRATIONS: "true"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    build:
      context: .
      target: app
    command: ["php", "artisan", "horizon"]
    environment:
      APP_NAME: "Отклик"
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: "5432"
      DB_DATABASE: otklick
      DB_USERNAME: otklick
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      RUN_MIGRATIONS: "false"
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
