name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, redis, bcmath, intl, zip, pcntl, sockets
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (code style)
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: php -d memory_limit=512M ./vendor/bin/phpstan analyse --no-progress

      - name: Tests (Unit + Integration + Feature)
        run: composer test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - name: Build assets
        run: npm run build
