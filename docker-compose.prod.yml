services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    expose:
      - "8000"
    env_file: .env
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    build:
      context: .
      target: app
    command: ["php", "artisan", "horizon"]
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy

  # Планировщик Laravel: крутит schedule:work (раз в минуту проверяет расписание).
  # Нужен для авто-закрытия протухших диалогов (conversations:close-stale).
  scheduler:
    build:
      context: .
      target: app
    command: ["php", "artisan", "schedule:work"]
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Long polling Telegram: сервер сам забирает апдейты (вебхуки в РФ недоступны).
  telegram:
    build:
      context: .
      target: app
    command: ["php", "artisan", "telegram:poll"]
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Bots Long Poll ВКонтакте: сервер сам забирает апдейты сообществ.
  vk:
    build:
      context: .
      target: app
    command: ["php", "artisan", "vk:poll"]
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Long polling MAX: сервер сам забирает апдейты ботов MAX (GET /updates).
  max:
    build:
      context: .
      target: app
    command: ["php", "artisan", "max:poll"]
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Long polling WhatsApp (Green API): забирает входящие (receiveNotification).
  whatsapp:
    build:
      context: .
      target: app
    command: ["php", "artisan", "whatsapp:poll"]
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_started
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgsql:
    build:
      context: ./docker/postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Обратный прокси с автоматическим Let's Encrypt для обоих доменов.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  storage_public:
  storage_logs:
  caddy_data:
  caddy_config:

# IPv6 в сети контейнеров: api.telegram.org заблокирован Роскомнадзором по IPv4,
# но доступен по IPv6 (у хоста IPv6 есть). Docker 29 поднимает NAT66 (ip6tables)
# через IPv6 хоста. ВАЖНО: указываем ОБЕ подсети явно — если задать только IPv6,
# Docker перестаёт управлять IPv4 и ломает внутренний DNS (redis/pgsql).
networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
        - subnet: fd00:dead:beef:1::/64
